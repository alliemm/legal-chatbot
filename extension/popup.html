<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LexAssist T&C Detector</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <span class="brand">LexAssist</span>
    </header>

    <main class="main">
      <div class="status-area" id="statusArea">
        <div class="status-icon" id="statusIcon" aria-hidden="true"></div>
        <p class="status-text" id="statusText">Checking page...</p>
      </div>

      <details class="signals-section" id="signalsSection" hidden>
        <summary class="signals-toggle">Matched signals</summary>
        <ul class="signals-list" id="signalsList"></ul>
      </details>
    </main>

    <footer class="footer">
      Powered by <span class="footer-brand">LexAssist</span>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
